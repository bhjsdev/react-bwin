name: Publish to npm

# Two publish paths share this one file because npm trusted publishing (OIDC) allows only one
# workflow filename per package:
#   - publish (manual)  : workflow_dispatch (dev_release unchecked) → stable release under `latest`, gated on PUBLISH env.
#   - dev-publish       : merged PR to main (auto, unattended) OR workflow_dispatch with `dev_release`
#                         checked → ephemeral <next-patch>-dev-<sha> under `dev`. A manual dev run builds
#                         against whatever branch/tag is picked in the run's "Use workflow from" selector.

on:
  workflow_dispatch:
    inputs:
      dev_release:
        description: 'Publish dev release from selected branch'
        type: boolean
        default: false
  pull_request:
    types: [closed]
    branches: [main]
    # Only changes that affect the published package warrant a dev pre-release.
    # dev/, docs/, *.md, .github/, and config that doesn't feed the build are excluded.
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.dev_release != true
    runs-on: ubuntu-latest
    environment: PUBLISH
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Determine version and check for existing tag
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists — bump the version in package.json before publishing."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Publish to npm
        run: |
          if [[ "${{ steps.version.outputs.tag }}" == *-dev.* ]]; then
            pnpm publish --no-git-checks --access public --tag dev
          else
            pnpm publish --no-git-checks --access public --tag latest
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # Release notes only for real releases, not -dev.* prereleases.
      - name: Create release notes
        if: ${{ !contains(steps.version.outputs.tag, '-dev.') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Intentionally ungated (no `environment:`): auto on merge to main, or manual from the
  # selected branch via the `dev_release` checkbox — for cutting a dev build of in-progress work.
  dev-publish:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' && inputs.dev_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Compute ephemeral dev version
        id: version
        run: |
          base="$(node -p "require('./package.json').version")"
          # Next patch: split on '.', bump the last field. No semver dependency needed.
          next="$(node -p "const [a,b,c]=require('./package.json').version.split('.'); [a,b,Number(c)+1].join('.')")"
          sha="$(git rev-parse --short HEAD)"
          devver="${next}-dev-${sha}"
          # Edits the runner's copy only; --no-git-tag-version makes no commit and no tag.
          npm version --no-git-tag-version "$devver"
          echo "devver=$devver" >> "$GITHUB_OUTPUT"
          echo "Publishing dev release \`$devver\` (base $base)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --tag dev
